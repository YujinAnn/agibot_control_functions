robot: x2

task_id: Mjlab-Tracking-Flat-Agibot-X2-ROM-Online-No-State-Estimation

# Whole-body tracking checkpoint (edit to your run).
checkpoint_path: robots/x2/default_policy/fom/model.pt

rom_reference:
  config_path: thirdparty/mjlab/src/mjlab/tasks/tracking/config/x2/rom_online_reference.yaml

joystick:
  ranges:
    lin_vel_x: [-2.0, 3.5]
    lin_vel_y: [-1.0, 1.0]
    ang_vel_z: [-3.14, 3.14]
  foot_air_ranges:
    lin_vel_x: [-0.75, 0.75]
    lin_vel_y: [-0.5, 0.5]
    ang_vel_z: [-1.0, 1.0]

# Joints removed from X2 mimic deploy MJCF (not in 20-D policy). Values used for
# FK/reference only; no actuators in sim (see rom_deploy/sim/assets/x2/robot.xml).
soft_locked:
  waist_yaw_joint: 0.0
  waist_pitch_joint: 0.0
  waist_roll_joint: 0.0
  head_yaw_joint: 0.0
  head_pitch_joint: 0.0
  left_wrist_yaw_joint: 0.0
  left_wrist_pitch_joint: 0.0
  left_wrist_roll_joint: 0.0
  right_wrist_yaw_joint: 0.0
  right_wrist_pitch_joint: 0.0
  right_wrist_roll_joint: 0.0

# X2_WHOLE_BODY_TRACKING_JOINT_ORDER (31). Empty default_q → filled at export from mjlab.
# kp/kd: policy command gains; stand_kp/stand_kd: STAND_HOLD + arm gain-blend reference.
